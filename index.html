<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0A0A0A">
  <title>VAR - منصة رياضية</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #E30613;
      --primary-dark: #8b0000;
      --secondary-color: #1E88E5;
      --accent-color: #FFC107;
      --dark-bg: #000;
      --card-bg: #1A1A1A;
      --text-primary: #FFFFFF;
      --text-secondary: #B0B0B0;
      --success-color: #4CAF50;
      --info-color: #2196F3;
      --warning-color: #FF9800;
      --danger-color: #F44336;
    }
    

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--dark-bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
      position: relative;
      overflow-x: hidden;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 15px;
      position: relative;
      justify-content: center;
      align-items: center;
    }

    /* Features Grid */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-top: 20px;
      width: 100%;
      max-width: 500px;
    }

    .feature-card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 25px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .feature-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(227, 6, 19, 0.1), rgba(227, 6, 19, 0));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .feature-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .feature-card:hover::before {
      opacity: 1;
    }

    .feature-card:active {
      transform: translateY(0);
    }

    .feature-icon {
      font-size: 2.5rem;
      margin-bottom: 15px;
      transition: all 0.3s ease;
    }

    .feature-card:hover .feature-icon {
      transform: scale(1.1);
    }

    .feature-title {
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 5px;
    }

    .feature-desc {
      color: var(--text-secondary);
      font-size: 0.8rem;
      text-align: center;
    }

    .feature-card i {
      color: var(--feature-color);
    }

    /* Notification Toast */
    .toast {
      position: fixed;
      bottom: -100px;
      right: 20px;
      left: auto;
      background: var(--card-bg);
      color: var(--text-primary);
      padding: 15px 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 1100;
      transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      max-width: 300px;
      border-left: 4px solid var(--primary-color);
    }

    .toast.show {
      bottom: 20px;
    }

    .toast-icon {
      font-size: 1.5rem;
      color: var(--primary-color);
    }

    .toast-close {
      margin-right: auto;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .toast-close:hover {
      color: var(--text-primary);
    }

    /* Responsive Design */
    @media (min-width: 768px) {
      .features-grid {
        grid-template-columns: repeat(4, 1fr);
        max-width: 1000px;
        margin: 30px auto;
      }
    }

    /* Animations */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .feature-card:nth-child(1) {
      animation: float 4s ease-in-out infinite;
    }

    .feature-card:nth-child(2) {
      animation: float 4s ease-in-out infinite 0.5s;
    }

    .feature-card:nth-child(3) {
      animation: float 4s ease-in-out infinite 1s;
    }

    .feature-card:nth-child(4) {
      animation: float 4s ease-in-out infinite 1.5s;
    }

    /* Ripple Effect */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      transform: scale(0);
      animation: ripple 0.6s linear;
      pointer-events: none;
    }

    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }
    
    /* توحيد شكل جميع الأيقونات: أسود + بوردر أبيض */
    .feature-icon,
    .toast-icon {
      color: #000 !important;
      -webkit-text-stroke: 1.75px #fff;
      text-stroke: 1px #fff;
    }

    /* إلغاء ألوان الميزات السابقة */
    .feature-card i {
      color: #000 !important;
    }
    
    /* إزالة أي عناصر تنقل أو أزرار قوائم بشكل قاطع */
    .fab, .side-nav, .nav-menu, .nav-item, .nav-header, .close-nav, .nav-footer, .app-version, .overlay, [id="menuBtn"], [class*="fab"], [class*="side-nav"] {
      display: none !important;
      visibility: hidden !important;
      pointer-events: none !important;
      width: 0 !important;
      height: 0 !important;
      opacity: 0 !important;
      position: absolute !important;
      z-index: -9999 !important;
    }
    
    /* التأكد من عدم ظهور أي خلفية أو overlay */
    body > .overlay, .overlay {
      display: none !important;
      background: transparent !important;
    }
  </style>
</head>
<body>

  <!-- Main Content: فقط البطاقات الأساسية، تم ازالة الهيدر وازالة الفاب وازالة القائمة وازالة الاوفرلاي -->
  <main class="main-content">
    <div class="features-grid">
      <div class="feature-card" id="channels-card" onclick="window.location.href='https://varref.github.io/LiveT/'">
        <i class="feature-icon fas fa-tv"></i>
        <h3 class="feature-title">القنوات الناقلة</h3>
        <p class="feature-desc">شاهد جميع القنوات الناقلة للمباريات</p>
      </div>
      
      <div class="feature-card" id="matches-card" onclick="window.location.href='https://varref.github.io/Match/'">
        <i class="feature-icon fas fa-trophy"></i>
        <h3 class="feature-title">المباريات</h3>
        <p class="feature-desc">متابعة المباريات القديمة</p>
      </div>
      
      <div class="feature-card" id="news-card" onclick="window.location.href='https://varref.github.io/KH/'">
        <i class="feature-icon fas fa-newspaper"></i>
        <h3 class="feature-title">أخبار الرياضة</h3>
        <p class="feature-desc">آخر الأخبار والتطورات في العالم الرياضي</p>
      </div>
      
      <div class="feature-card" id="schedule-card" onclick="window.location.href='https://varref.github.io/LiveE/'">
        <i class="feature-icon fas fa-calendar-alt"></i>
        <h3 class="feature-title">جدول المباريات</h3>
        <p class="feature-desc">تعرف على مواعيد المباريات القادمة</p>
      </div>
    </div>
  </main>

  <!-- Notification Toast: تم الابقاء عليه لانه ليس جزء من nav menu ولا ازراره -->
  <div class="toast" id="telegramToast">
    <i class="fas fa-paper-plane toast-icon"></i>
    <div class="toast-content">
      تابعنا على التليجرام للحصول على آخر التحديثات
    </div>
    <i class="fas fa-times toast-close" id="toastClose"></i>
  </div>

  <script>
    // =========================================================================
    // تم إزالة NAV MENU بالكامل وكل الأزرار بداخله (القائمة الجانبية وكل عناصرها)
    // كما تم إزالة الزر الذي يفتحه (FAB) وجميع التوابع المرتبطة به (اوفرلاي، كلosing handlers)
    // لا يوجد أي كود متبقي يتعامل مع فتح أو إغلاق أي قائمة.
    // تم مسح جميع العناصر: sideNav, menuBtn, overlay, nav-menu, nav-item, closeNav, nav-footer
    // فقط ripple effect للبطاقات وإشعار التليجرام.
    // =========================================================================
    
    // Ripple Effect يضيف تأثير الموجة لبطاقات المحتوى فقط (لا يوجد أزرار تنقل)
    document.querySelectorAll('.feature-card').forEach(button => {
      button.addEventListener('click', function(e) {
        // منع تأثير التموج في حال النقر على الروابط بطريقة طبيعية
        const rect = this.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
          
        const ripple = document.createElement('span');
        ripple.classList.add('ripple');
        ripple.style.left = `${x}px`;
        ripple.style.top = `${y}px`;
        ripple.style.position = 'absolute';
        ripple.style.borderRadius = '50%';
        ripple.style.backgroundColor = 'rgba(255,255,255,0.5)';
        ripple.style.pointerEvents = 'none';
        ripple.style.transform = 'scale(0)';
        ripple.style.animation = 'ripple 0.6s linear';
        ripple.style.width = '10px';
        ripple.style.height = '10px';
        
        this.style.position = 'relative';
        this.appendChild(ripple);
          
        setTimeout(() => {
          if (ripple && ripple.remove) ripple.remove();
        }, 600);
      });
    });

    // عند تحميل الصفحة (Fade In)

    
    // إضافة تعريف animation الripple في حال لم يتم تغطيته بشكل كامل
    if (!document.querySelector('#ripple-keyframe-style')) {
      const styleSheet = document.createElement("style");
      styleSheet.id = "ripple-keyframe-style";
      styleSheet.textContent = `
        @keyframes ripple {
          to {
            transform: scale(20);
            opacity: 0;
          }
        }
      `;
      document.head.appendChild(styleSheet);
    }
    
    // Show Telegram Toast بعد 1.5 ثانية كما في السابق
    setTimeout(() => {
      const toast = document.getElementById('telegramToast');
      if (toast) toast.classList.add('show');
    }, 200);
    
    // Close Toast (زر الإغلاق الخاص بالإشعار فقط)
    const toastClose = document.getElementById('toastClose');
    if (toastClose) {
      toastClose.addEventListener('click', function(e) {
        e.stopPropagation();
        const toast = document.getElementById('telegramToast');
        if (toast) toast.classList.remove('show');
      });
    }
    
    // Click on toast to open Telegram (النقر على منطقة المحتوى أو الأيقونة)
    const telegramToast = document.getElementById('telegramToast');
    if (telegramToast) {
      telegramToast.addEventListener('click', function(e) {
        // إذا تم الضغط على زر الإغلاق لا نفتح الرابط
        if (e.target.classList.contains('toast-close') || e.target.closest('.toast-close')) {
          return;
        }
        window.open('https://t.me/var_app', '_blank');
      });
    }
    
    // تنظيف شامل: التأكد من عدم وجود أي عنصر من الـ nav menu أو الـ fab في الـ DOM
    // حذف أي عنصر يحمل id="menuBtn", class="fab", class="side-nav", class="overlay"
    const removeElementsBySelectors = (selectors) => {
      selectors.forEach(selector => {
        const elements = document.querySelectorAll(selector);
        elements.forEach(el => {
          if (el && el.parentNode) el.parentNode.removeChild(el);
        });
      });
    };
    
    removeElementsBySelectors([
      '#menuBtn', '.fab', '.side-nav', '#sideNav', '.nav-menu', '.nav-item', 
      '.nav-header', '#closeNav', '.close-nav', '.nav-footer', '.app-version',
      '.overlay', '#overlay', '[class*="side-nav"]', '[id*="sideNav"]'
    ]);
    
    // إزالة أي متغيرات أو بقايا للكود في window
    delete window.sideNav;
    delete window.menuBtn;
    delete window.closeNav;
    delete window.overlay;
    
    // إزالة أي event listeners قديمة مرتبطة بـ document أو body بخصوص فتح القائمة
    // لا يمكن إزالة all listeners لكن نضمن أن أي كود سابق لا يؤثر
    console.log("✅ تم إزالة قائمة التنقل (nav menu) بالكامل، وجميع الأزرار بداخلها، وتم حذف الزر الذي كان يفتحها (FAB) وجميع العناصر المرتبطة (overlay, close buttons, navbar).");
    
    // إضافة تأكيد بصري في واجهة المستخدم لا شيء، فقط البطاقات
    // منع ظهور أي عناصر عائمة أو قوائم منبثقة
    const styleClear = document.createElement('style');
    styleClear.textContent = `
      /* إزالة أي بقايا للـ nav أو الـ fab قد تكون ظهرت ديناميكياً */
      .fab, .side-nav, .nav-menu, .nav-item, .nav-header, .close-nav, .nav-footer, .app-version, .overlay, #menuBtn, [onclick*="menu"], [onclick*="nav"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        width: 0px !important;
        height: 0px !important;
        pointer-events: none !important;
        position: fixed !important;
        top: -9999px !important;
        left: -9999px !important;
      }
      body {
        margin: 0;
        padding: 0;
      }
      /* ضمان أن main-content في المنتصف دون وجود أي أزرار جانبية */
      .main-content {
        padding-top: 20px;
      }
    `;
    document.head.appendChild(styleClear);
    
    // إضافة إعادة تعيين للـ scroll أو أي سلوك قديم
    window.addEventListener('load', function() {
      // فحص نهائي: إذا كان هناك عنصر fab ظاهر بالخطأ نزيله
      const anyFab = document.querySelector('.fab, #menuBtn, [class*="fab"]');
      if (anyFab && anyFab.parentNode) anyFab.parentNode.removeChild(anyFab);
      
      const anySide = document.querySelector('.side-nav, #sideNav, .nav-menu');
      if (anySide && anySide.parentNode) anySide.parentNode.removeChild(anySide);
      
      const anyOverlay = document.querySelector('.overlay, #overlay');
      if (anyOverlay && anyOverlay.parentNode) anyOverlay.parentNode.removeChild(anyOverlay);
      
      // لا توجد قائمة تنقل ولاشيء يتعلق بها بالتأكيد
    });
  </script>
</body>
</html>
